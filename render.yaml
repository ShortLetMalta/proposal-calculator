services:
  - type: web
    name: eleva-malta-calculator-backend
    runtime: node
    buildCommand: npm install && cd backend && npm install && npx prisma generate
    startCommand: cd backend && node app.js
    envVars:
      - key: NODE_VERSION
        value: 22.x
      - key: DATABASE_URL
        sync: false # Neon.tech connection string (matches Owner Value's setup)
    healthCheckPath: /_health
    autoDeploy: true

# No separate frontend service — matches Owner Value's actual production setup,
# which only hosts the Node backend on Render. The static calculator (index.html
# + friends) is used locally/manually, same as Owner Value's calcolatore-prospetti.
