services:
  - type: web
    name: eleva-malta-calculator-backend
    runtime: node
    buildCommand: npm install && cd backend && npm install && npx prisma generate
    preDeployCommand: cd backend && npx prisma migrate deploy
    startCommand: cd backend && node app.js
    envVars:
      - key: NODE_VERSION
        value: 22.x
      - key: DATABASE_URL
        sync: false # Neon.tech connection string (matches Owner Value's setup)
    healthCheckPath: /_health
    autoDeploy: true

  - type: web
    name: eleva-malta-calculator-frontend
    runtime: static
    buildCommand: echo "Static site ready"
    staticPublishPath: ./
    autoDeploy: true

# Frontend is served as a static site from the repo root (index.html + friends).
# Pattern matches Owner Value's calcolatore-prospetti setup, which uses the
# same two-service split (Node backend + static frontend).
