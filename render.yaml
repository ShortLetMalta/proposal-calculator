services:
  - type: web
    name: eleva-malta-calculator-backend
    runtime: node
    buildCommand: npm install && cd backend && npm install && npx prisma generate
    startCommand: cd backend && node app.js
    envVars:
      - key: NODE_VERSION
        value: 22.x
      - key: DATABASE_URL
        sync: false # User should provide their own (e.g. Render Postgres or Neon.tech)
    healthCheckPath: /_health
    autoDeploy: true

  - type: web
    name: eleva-malta-calculator-frontend
    runtime: static
    buildCommand: echo "static site, no build step"
    staticPublishPath: ./
    autoDeploy: true
